<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="stylesheet.css">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <div class="result">

        </div>

        <div class="buttons">
            <div class="numbers">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>0</button>
                <button>&#9003;</button>
                <button>Clear</button>
            </div>
            <div class="operations">
                <button>+</button>
                <button>-</button>
                <button>&divide;</button>
                <button>&times;</button>
            </div>
        </div>
    </div>
</body>
</html>
